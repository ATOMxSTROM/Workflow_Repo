name: Daily Auto Commit Workflow

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Step for 23f1001520@ds.study.iitm.ac.in
        run: echo "Executing scheduled commit"

      - name: Make daily commit
        run: |
          echo "Last updated: $(date -u)" >> daily-log.txt
          git config --global user.name "github-actions"
          git config --global user.email "23f1001520@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily commit - $(date -u)" || echo "No changes to commit"
          git push
